# ============================================================
# COMPUTER.IAI.ONE — LOCAL DEV STACK
# Phase 1 only. Do not use in production.
# ============================================================

version: "3.8"

services:
  # --- PostgreSQL (source of truth) ---
  postgres:
    image: postgres:16-alpine
    container_name: iai-postgres
    environment:
      POSTGRES_USER: iai_dev
      POSTGRES_PASSWORD: iai_dev_secret
      POSTGRES_DB: iai_core_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Docs/infrastructure/sql/001_computer_core_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iai_dev -d iai_core_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis (cache, session, rate limit) ---
  redis:
    image: redis:7-alpine
    container_name: iai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- API (Fastify/Node) ---
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: iai-api
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://iai_dev:iai_dev_secret@postgres:5432/iai_core_dev
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      JWT_SECRET: dev-jwt-secret-do-not-use-in-production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    command: pnpm dev:api

volumes:
  postgres_data:
  redis_data:
