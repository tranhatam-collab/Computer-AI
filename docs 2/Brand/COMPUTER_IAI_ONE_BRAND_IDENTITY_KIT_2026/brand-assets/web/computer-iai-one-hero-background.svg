      <stop offset="0%" stop-color="#F2D98B"/>
      <stop offset="45%" stop-color="#D8B35A"/>
      <stop offset="100%" stop-color="#9A7134"/>
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
