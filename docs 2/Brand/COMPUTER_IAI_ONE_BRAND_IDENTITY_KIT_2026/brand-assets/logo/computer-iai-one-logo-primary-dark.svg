<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-label="Computer IAI One primary logo">

  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2D98B"/>
      <stop offset="45%" stop-color="#D8B35A"/>
      <stop offset="100%" stop-color="#9A7134"/>
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B171D"/>
      <stop offset="100%" stop-color="#071014"/>
    </linearGradient>
    <linearGradient id="signalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#48D6C8"/>
      <stop offset="50%" stop-color="#3E7BFF"/>
      <stop offset="100%" stop-color="#6F5BFF"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="goldGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.85  0 1 0 0 0.67  0 0 1 0 0.26  0 0 0 0.35 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
<rect width="1400" height="360" rx="40" fill="#071014"/>
<g transform="translate(72,50) scale(0.52)">
  <path d="M256 64 L422 160 L422 352 L256 448 L90 352 L90 160 Z" fill="none" stroke="url(#goldGradient)" stroke-width="12" stroke-linejoin="round"/>
  <path d="M256 100 L390 178 L390 334 L256 412 L122 334 L122 178 Z" fill="rgba(244,241,232,0.025)" stroke="rgba(242,217,139,0.28)" stroke-width="2"/>
  <path d="M128 256 C166 142, 346 142, 384 256 C346 370, 166 370, 128 256 Z" fill="none" stroke="url(#signalGradient)" stroke-width="4" opacity="0.36"/>
  <rect x="176" y="166" width="32" height="180" rx="16" fill="url(#goldGradient)"/>
  <path d="M236 346 L256 166 L276 346 Z" fill="url(#goldGradient)"/>
  <rect x="304" y="166" width="32" height="180" rx="16" fill="url(#goldGradient)"/>
  <circle cx="256" cy="276" r="12" fill="#071014" opacity="0.9"/>
</g>
<g transform="translate(360,96)">
  <text x="0" y="62" font-family="Inter, Satoshi, ui-sans-serif, system-ui" font-weight="800" font-size="76" letter-spacing="-3" fill="#F4F1E8">Computer<tspan fill="url(#goldGradient)">.iai.one</tspan></text>
  <text x="4" y="126" font-family="Inter, Satoshi, ui-sans-serif, system-ui" font-weight="500" font-size="24" letter-spacing="3.8" fill="#A7B0B7">SELF-UPGRADING PERSONAL AI COMPUTER SYSTEM</text>
</g>
</svg>