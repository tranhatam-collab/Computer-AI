<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1100" viewBox="0 0 900 1100" role="img" aria-label="Computer IAI One vertical logo">

  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2D98B"/>
      <stop offset="45%" stop-color="#D8B35A"/>
      <stop offset="100%" stop-color="#9A7134"/>
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B171D"/>
      <stop offset="100%" stop-color="#071014"/>
    </linearGradient>
    <linearGradient id="signalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#48D6C8"/>
      <stop offset="50%" stop-color="#3E7BFF"/>
      <stop offset="100%" stop-color="#6F5BFF"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
