      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.85  0 1 0 0 0.67  0 0 1 0 0.26  0 0 0 0.35 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
